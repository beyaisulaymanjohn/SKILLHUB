<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamSkillHub — Gambia's Skilled Worker Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#121216;--sur:#1E1E26;--card:#252530;--ch:#2D2D3A;--b:#383845;--bl:#454555;--am:#FFB300;--al:#FFD54F;--ad:rgba(255,179,0,.15);--tx:#FFFFFF;--td:#D1D1E0;--mt:#A0A0B5;--ok:#4ADE80;--er:#F87171;--inf:#60A5FA;--red:#EF4444;--blue:#3B82F6;--green:#22C55E;--nav:rgba(18,18,22,.96)}
        [data-theme="light"]{--bg:#F8F9FA;--sur:#FFFFFF;--card:#FFFFFF;--ch:#F1F3F5;--b:#E9ECEF;--bl:#DEE2E6;--am:#F59E0B;--al:#D97706;--ad:rgba(245,158,11,.1);--tx:#1A1A1A;--td:#495057;--mt:#6C757D;--ok:#28A745;--er:#DC3545;--inf:#007BFF;--red:#CE1126;--blue:#3E6EB0;--green:#3A7728;--nav:rgba(255,255,255,.97)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        h1,h2,h3,.bc{font-family:'Barlow Condensed',sans-serif;font-weight:800;line-height:.93;text-transform:uppercase;letter-spacing:-.01em}
        nav{position:fixed;inset:0 0 auto 0;z-index:900;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:var(--nav);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
        .logo{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;user-select:none}
        .logo .r{color:var(--red)} .logo .a{color:var(--am)}
        .nl{display:flex;gap:4px;align-items:center}
        .nb{height:31px;padding:0 13px;border-radius:7px;border:1px solid var(--b);background:none;color:var(--td);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
        .nb:hover{border-color:var(--am);color:var(--am)}
        .nb-book{background:#3A7728;border-color:#3A7728;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase}
        .pg{display:none;min-height:100vh;padding-top:54px}.pg.on{display:block}
        .hero{position:relative;padding:60px 38px 44px;overflow:hidden}
        .sw{max-width:540px;background:var(--sur);border:1px solid var(--bl);border-radius:10px;display:flex;gap:4px;padding:4px;margin-bottom:44px}
        .sw input{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--tx);padding:7px 10px}
        .sbtn{background:var(--am);color:#000;border:none;padding:8px 18px;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;cursor:pointer}
        #toast{position:fixed;bottom:20px;right:20px;z-index:2000;background:var(--card);border:1px solid var(--bl);border-radius:9px;padding:11px 15px;font-size:12px;opacity:0;transition:all .24s;pointer-events:none}
        #toast.on{opacity:1;transform:translateY(0)}
        .status-toggle-input { cursor: pointer; accent-color: var(--am); }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">GAMSKILL<span class="r">HUB</span></div>
        <div class="nl">
            <button class="nb" onclick="showPage('browse')">Browse Workers</button>
            <button class="nb nb-book" onclick="showPage('register')">Join as Pro</button>
            <button class="nb nb-login" id="loginBtn">Login</button>
        </div>
    </nav>

    <div id="home" class="pg on">
        <section class="hero">
            <div class="hi">
                <div class="htag">Available Across The Gambia</div>
                <h1>Find the best <em>Skilled</em> Workers.</h1>
                <p class="hsub">Connecting Gambian talent with those who need them most. From plumbers to creatives, we hub the best.</p>
                <div class="sw">
                    <input type="text" id="mainSearch" placeholder="What skill are you looking for?">
                    <button class="sbtn" onclick="showPage('browse')">Search</button>
                </div>
            </div>
        </section>
    </div>

    <div id="browse" class="pg">
        <div class="brw">
            <div class="bh">
                <h2 class="bt">Browse Skills</h2>
                <span class="rc" id="workerCount">0 Workers Found</span>
            </div>
            <div class="wgrid" id="workerContainer">
                <div class="sp"><div class="spin"></div></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- CONFIGURATION ---
        const supabaseUrl = 'https://lhzlqzpkqdppgnesitwo.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxoemxxenBrcWRwcGduZXNpdHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjY0ODEsImV4cCI6MjA5MTE0MjQ4MX0.zEqZv9O5LuC8Ma5mMQSGycwxnwXa4l7aL7dIZ6_Cosg';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- NAVIGATION ---
        function showPage(pageId) {
            document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
            document.getElementById(pageId).classList.add('on');
            if(pageId === 'browse') fetchWorkers();
        }

        // --- LOAD DATA ---
        async function fetchWorkers() {
            const container = document.getElementById('workerContainer');
            const { data, error } = await _supabase.from('workers').select('*');

            if (error) {
                container.innerHTML = `<p class="empty">Error loading workers.</p>`;
                return;
            }

            document.getElementById('workerCount').innerText = `${data.length} Workers Found`;
            container.innerHTML = data.map(w => `
                <div class="wc">
                    <div class="ct">
                        <div class="wav">${w.name[0]}</div>
                        <div class="wi">
                            <div class="wn">${w.name}</div>
                            <div class="wps">${w.skill || 'Professional'}</div>
                        </div>
                    </div>
                    <div class="wf">
                        <label style="font-size:10px; color:var(--mt)">ACTIVE STATUS</label>
                        <input type="checkbox" 
                               class="status-toggle-input" 
                               data-id="${w.id}" 
                               ${w.is_active ? 'checked' : ''}>
                    </div>
                </div>
            `).join('');
        }

        // --- TOGGLE RECONNECTION LOGIC ---
        document.addEventListener('change', async (e) => {
            if (e.target.classList.contains('status-toggle-input')) {
                const id = e.target.dataset.id;
                const active = e.target.checked;

                const { error } = await _supabase
                    .from('workers')
                    .update({ is_active: active })
                    .eq('id', id);

                if (error) {
                    showToast("Failed to update status", "er");
                    e.target.checked = !active;
                } else {
                    showToast("Status updated successfully", "ok");
                }
            }
        });

        // --- TOAST ---
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `on ${type}`;
            setTimeout(() => t.className = '', 3000);
        }

        // Initial load
        window.onload = () => { if(window.location.hash === '#browse') showPage('browse'); };
    </script>
</body>
</html>
